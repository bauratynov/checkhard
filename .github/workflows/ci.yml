name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    name: build + test (${{ matrix.os }} / ${{ matrix.cc }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04]
        cc: [gcc, clang]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: compiler version
        run: ${{ matrix.cc }} --version
      - name: build
        run: make CC=${{ matrix.cc }}
      - name: unit + integration tests
        run: make test CC=${{ matrix.cc }}
      - name: audit a distro binary (self-check)
        run: ./checkhard /bin/ls /bin/bash || true

  static-analysis:
    name: cppcheck
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y cppcheck
      - name: cppcheck
        run: |
          cppcheck --std=c99 --enable=warning,performance,portability \
                   --error-exitcode=1 --quiet \
                   -Iinclude src/ tests/

  sanitizers:
    name: ASan + UBSan
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: sanitized build
        run: |
          make CC=clang CFLAGS="-std=c99 -Wall -Wextra -O1 -g -Iinclude \
               -D_GNU_SOURCE -fsanitize=address,undefined -fno-omit-frame-pointer"
      - name: sanitized unit tests
        run: |
          make -C tests clean
          make -C tests test_checks \
            CC=clang \
            CFLAGS="-std=c99 -Wall -Wextra -O1 -g -I../include -D_GNU_SOURCE \
                    -fsanitize=address,undefined -fno-omit-frame-pointer"
          ./tests/test_checks
