<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 300" role="img" aria-labelledby="cht chd">
  <title id="cht">checkhard — hardening verdict matrix</title>
  <desc  id="chd">
    A matrix of binaries (rows) versus hardening checks (columns). Each cell
    is coloured green for pass, amber for partial, red for fail. The bin_minimal
    row is overwhelmingly red; bin_strict is overwhelmingly green.
  </desc>

  <style><![CDATA[
    .bg     { fill:#0d1117; }
    .panel  { fill:#161b22; stroke:#30363d; }
    .ok     { fill:#2ea04366; stroke:#3fb950; stroke-width:1; }
    .warn   { fill:#d2992266; stroke:#d29922; stroke-width:1; }
    .bad    { fill:#f8514966; stroke:#f85149; stroke-width:1; }
    .glyph  { fill:#e6edf3; font:bold 14px ui-monospace,Menlo,monospace; text-anchor:middle; dominant-baseline:central; }
    .title  { fill:#e6edf3; font:bold 13px ui-monospace,Menlo,monospace; }
    .sub    { fill:#7d8590; font:11px ui-monospace,Menlo,monospace; }
    .row    { fill:#e6edf3; font:12px ui-monospace,Menlo,monospace; }
    .col    { fill:#7d8590; font:10px ui-monospace,Menlo,monospace; text-anchor:middle; }
    .stamp  { fill:#3fb950; font:bold 13px ui-monospace,Menlo,monospace; }
    .stampR { fill:#f85149; font:bold 13px ui-monospace,Menlo,monospace; }
  ]]></style>

  <rect class="bg" width="820" height="300"/>

  <text x="20" y="28" class="title">checkhard --json  → hardening verdict matrix</text>
  <text x="20" y="46" class="sub">rows: audited binaries  ·  columns: checks  ·  cell: per-check verdict</text>

  <!-- Column headers -->
  <g transform="translate(240,70)">
    <text x="40"  class="col">PIE</text>
    <text x="110" class="col">NX</text>
    <text x="180" class="col">RELRO</text>
    <text x="250" class="col">canary</text>
    <text x="320" class="col">FORTIFY</text>
    <text x="390" class="col">RPATH</text>
    <text x="460" class="col">RWX</text>
  </g>

  <!-- Row 1: bin_minimal -->
  <text x="20" y="112" class="row">bin_minimal</text>
  <g transform="translate(240,90)">
    <rect class="bad"  x="10"  width="60" height="38"/><text class="glyph" x="40"  y="19">✗</text>
    <rect class="bad"  x="80"  width="60" height="38"/><text class="glyph" x="110" y="19">✗</text>
    <rect class="bad"  x="150" width="60" height="38"/><text class="glyph" x="180" y="19">✗</text>
    <rect class="bad"  x="220" width="60" height="38"/><text class="glyph" x="250" y="19">✗</text>
    <rect class="bad"  x="290" width="60" height="38"/><text class="glyph" x="320" y="19">✗</text>
    <rect class="ok"   x="360" width="60" height="38"/><text class="glyph" x="390" y="19">—</text>
    <rect class="ok"   x="430" width="60" height="38"/><text class="glyph" x="460" y="19">✓</text>
  </g>
  <text x="730" y="112" class="stampR">FAIL</text>

  <!-- Row 2: bin_partial_relro -->
  <text x="20" y="156" class="row">bin_partial_relro</text>
  <g transform="translate(240,134)">
    <rect class="ok"   x="10"  width="60" height="38"/><text class="glyph" x="40"  y="19">✓</text>
    <rect class="ok"   x="80"  width="60" height="38"/><text class="glyph" x="110" y="19">✓</text>
    <rect class="warn" x="150" width="60" height="38"/><text class="glyph" x="180" y="19">~</text>
    <rect class="ok"   x="220" width="60" height="38"/><text class="glyph" x="250" y="19">✓</text>
    <rect class="warn" x="290" width="60" height="38"/><text class="glyph" x="320" y="19">~</text>
    <rect class="ok"   x="360" width="60" height="38"/><text class="glyph" x="390" y="19">—</text>
    <rect class="ok"   x="430" width="60" height="38"/><text class="glyph" x="460" y="19">✓</text>
  </g>
  <text x="730" y="156" class="stampR">FAIL</text>

  <!-- Row 3: bin_with_rpath -->
  <text x="20" y="200" class="row">bin_with_rpath</text>
  <g transform="translate(240,178)">
    <rect class="ok"   x="10"  width="60" height="38"/><text class="glyph" x="40"  y="19">✓</text>
    <rect class="ok"   x="80"  width="60" height="38"/><text class="glyph" x="110" y="19">✓</text>
    <rect class="ok"   x="150" width="60" height="38"/><text class="glyph" x="180" y="19">✓</text>
    <rect class="ok"   x="220" width="60" height="38"/><text class="glyph" x="250" y="19">✓</text>
    <rect class="ok"   x="290" width="60" height="38"/><text class="glyph" x="320" y="19">✓</text>
    <rect class="warn" x="360" width="60" height="38"/><text class="glyph" x="390" y="19">!</text>
    <rect class="ok"   x="430" width="60" height="38"/><text class="glyph" x="460" y="19">✓</text>
  </g>
  <text x="730" y="200" class="stampR">FAIL</text>

  <!-- Row 4: bin_strict -->
  <text x="20" y="244" class="row">bin_strict</text>
  <g transform="translate(240,222)">
    <rect class="ok" x="10"  width="60" height="38"/><text class="glyph" x="40"  y="19">✓</text>
    <rect class="ok" x="80"  width="60" height="38"/><text class="glyph" x="110" y="19">✓</text>
    <rect class="ok" x="150" width="60" height="38"/><text class="glyph" x="180" y="19">✓</text>
    <rect class="ok" x="220" width="60" height="38"/><text class="glyph" x="250" y="19">✓</text>
    <rect class="ok" x="290" width="60" height="38"/><text class="glyph" x="320" y="19">✓</text>
    <rect class="ok" x="360" width="60" height="38"/><text class="glyph" x="390" y="19">—</text>
    <rect class="ok" x="430" width="60" height="38"/><text class="glyph" x="460" y="19">✓</text>
  </g>
  <text x="730" y="244" class="stamp">PASS</text>

  <!-- footer legend -->
  <g transform="translate(20,280)">
    <rect class="ok" width="14" height="12"/>
    <text x="18" y="10" class="sub">pass</text>
    <rect class="warn" x="80" width="14" height="12"/>
    <text x="98" y="10" class="sub">partial / warn</text>
    <rect class="bad" x="200" width="14" height="12"/>
    <text x="218" y="10" class="sub">fail</text>
    <text x="600" y="10" class="sub">exit 0 = all pass · exit 1 = any fail · exit 2 = bad invocation</text>
  </g>
</svg>
